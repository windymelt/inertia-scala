name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Scala Native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang libidn2-dev

      # core / cask / tapir を JVM・JS 両ターゲットでコンパイル・テストする
      - name: Compile
        run: sbt compile

      # Native 起因の失敗を UI 上で切り分けるため JVM/JS と Native を分けて実行する
      - name: Test (JVM/JS)
        run: sbt "core/testOnly *" "coreJS/testOnly *" "inertia-tapir/testOnly *" "inertia-tapirJS/testOnly *"

      - name: Test (Native)
        run: sbt "coreNative/testOnly *" "inertia-tapirNative/testOnly *"
