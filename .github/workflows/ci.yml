name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The JVM axis also verifies that the JVM-only module (cask) and the
          # examples compile. cask has no tests, but testOnly * still compiles it.
          - platform: jvm
            tasks: '"core/testOnly *" "inertia-cask/testOnly *" "inertia-tapir/testOnly *" "example-cask/compile" "example-tapir/compile"'
          - platform: js
            tasks: '"coreJS/testOnly *" "inertia-tapirJS/testOnly *"'
          - platform: native
            tasks: '"coreNative/testOnly *" "inertia-tapirNative/testOnly *"'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Scala Native toolchain
        if: matrix.platform == 'native'
        run: sudo apt-get update && sudo apt-get install -y clang libidn2-dev

      - name: Test
        run: sbt ${{ matrix.tasks }}
